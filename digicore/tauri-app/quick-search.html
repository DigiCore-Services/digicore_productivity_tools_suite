<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Search</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --qs-bg: #ffffff;
      --qs-card-bg: #ffffff;
      --qs-text: #111827;
      --qs-muted: #6b7280;
      --qs-border: #e5e7eb;
      --qs-hover: #f3f4f6;
      --qs-selected: #dbeafe;
      --qs-danger: #b91c1c;
    }
    [data-theme="dark"] {
      --qs-bg: #111827;
      --qs-card-bg: #1f2937;
      --qs-text: #f3f4f6;
      --qs-muted: #9ca3af;
      --qs-border: #374151;
      --qs-hover: #374151;
      --qs-selected: #1e3a5f;
      --qs-danger: #fca5a5;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--qs-bg);
      color: var(--qs-text);
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .frame {
      height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--qs-border);
      border-radius: 10px;
      background: var(--qs-card-bg);
      overflow: hidden;
    }
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid var(--qs-border);
      background: var(--qs-card-bg);
      -webkit-app-region: drag;
    }
    .titlebar strong { font-size: 12px; }
    .titlebar button {
      -webkit-app-region: no-drag;
      border: 1px solid var(--qs-border);
      background: transparent;
      color: var(--qs-text);
      cursor: pointer;
      border-radius: 6px;
      padding: 2px 8px;
    }
    .search-wrap { padding: 10px; border-bottom: 1px solid var(--qs-border); }
    #search {
      width: 100%;
      border: 1px solid var(--qs-border);
      border-radius: 8px;
      background: transparent;
      color: var(--qs-text);
      padding: 8px 10px;
      outline: none;
    }
    #search:focus { border-color: #3b82f6; }
    .hint { margin-top: 6px; color: var(--qs-muted); font-size: 11px; }
    .list {
      flex: 1;
      overflow-y: auto;
    }
    .row {
      border-bottom: 1px solid var(--qs-border);
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
    }
    .row:hover { background: var(--qs-hover); }
    .row.selected { background: var(--qs-selected); }
    .row-top { display: flex; gap: 8px; align-items: center; }
    .trigger { font-weight: 600; }
    .badge {
      font-size: 10px;
      color: var(--qs-muted);
      border: 1px solid var(--qs-border);
      border-radius: 999px;
      padding: 1px 6px;
    }
    .preview {
      margin-top: 4px;
      color: var(--qs-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      padding: 12px;
      color: var(--qs-muted);
    }
    #ctx-menu {
      position: fixed;
      min-width: 230px;
      max-width: 280px;
      z-index: 9999;
      background: var(--qs-card-bg);
      border: 1px solid var(--qs-border);
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      display: none;
      overflow: hidden;
    }
    .ctx-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
    }
    .ctx-item:hover { background: var(--qs-hover); }
    .ctx-item.danger { color: var(--qs-danger); }
    .ctx-icon { width: 16px; text-align: center; }
    .ctx-sep { border-top: 1px solid var(--qs-border); margin: 2px 0; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="titlebar">
      <strong>Quick Search</strong>
      <button type="button" id="btn-close">Close</button>
    </div>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Search snippets (supports multi-word AND)" autocomplete="off">
      <div class="hint">Enter or double-click inserts into your previous active app.</div>
    </div>
    <div id="list" class="list"></div>
  </div>
  <div id="ctx-menu"></div>
  <script type="module" src="/src/quick-search.ts"></script>
</body>
</html>
